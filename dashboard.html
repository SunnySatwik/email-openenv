<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Battle Dashboard</title>
    
    <!-- Tailwind CSS for rich, modern aesthetics -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 500: '#22c55e', 600: '#16a34a', 900: '#14532d' },
                    }
                }
            }
        }
    </script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Realistic Mock Email for the Hard Task
        const mockEmail = {
            id: "msg-992",
            sender: "vp.operations@acmecorp.com",
            subject: "Urgent: Q3 Budget Review Delay",
            body: "Hi Team, I need to postpone tomorrow's budget review meeting to Friday. Please confirm if this works for you and let me know if any immediate approvals are waiting on me before the end of the week. Thanks.",
            timestamp: new Date().toISOString()
        };

        const Dashboard = () => {
            const [battleMode, setBattleMode] = useState(false);
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState([]);
            const [votes, setVotes] = useState({ gemini: 0, groq1: 0, groq2: 0 });

            useEffect(() => {
                if (battleMode && results.length === 0) {
                    runAgents();
                }
            }, [battleMode]);

            const runAgents = async () => {
                setLoading(true);
                try {
                    // Call our FastAPI server backend for real agent execution
                    const payload = {
                        task: "hard",
                        email: mockEmail
                    };
                    
                    const res = await fetch('http://localhost:8000/compare', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        setResults(data);
                    } else {
                        // Fallback dummy data if server isn't running
                        setResults([
                            { agent_id: 'gemini', model_name: 'gemini-2.5-flash', latency_ms: 1200, action: { reply_text: "Hi VP, Friday works for me. No urgent approvals needed on my end before then. Thanks." } },
                            { agent_id: 'groq1', model_name: 'llama-3.3-70b-versatile', latency_ms: 850, action: { reply_text: "Hello, confirmed for Friday. I have one urgent pending expense request that I will highlight now via separate email. Best." } },
                            { agent_id: 'groq2', model_name: 'llama-3.1-8b-instant', latency_ms: 320, action: { reply_text: "Friday is fine. Thanks." } }
                        ]);
                    }
                } catch (err) {
                    console.error("FastAPI backend not found, using mock data.", err);
                    setResults([
                        { agent_id: 'gemini', model_name: 'gemini-2.5-flash', latency_ms: 1200, action: { reply_text: "Hi VP, Friday works for me. No urgent approvals needed on my end before then. Thanks." } },
                        { agent_id: 'groq1', model_name: 'llama-3.3-70b-versatile', latency_ms: 850, action: { reply_text: "Hello, confirmed for Friday. I have one urgent pending expense request that I will highlight now via separate email. Best." } },
                        { agent_id: 'groq2', model_name: 'llama-3.1-8b-instant', latency_ms: 320, action: { reply_text: "Friday is fine. Thanks." } }
                    ]);
                }
                setLoading(false);
            };

            const handleVote = (agentId) => {
                setVotes(prev => ({
                    ...prev,
                    [agentId]: prev[agentId] + 1
                }));
            };

            const getVotePercentage = (agentId) => {
                const total = Object.values(votes).reduce((a, b) => a + b, 0);
                if (total === 0) return 0;
                return Math.round((votes[agentId] / total) * 100);
            };

            const AgentCard = ({ result }) => {
                const { agent_id, model_name, action, latency_ms } = result;
                const percent = getVotePercentage(agent_id);
                
                return (
                    <div className="glass-panel p-6 rounded-2xl flex flex-col items-center flex-1 transition-all duration-300 hover:scale-[1.02]">
                        <div className="w-full flex justify-between items-center mb-4 pb-4 border-b border-slate-700/50">
                            <div>
                                <h3 className="font-bold text-lg text-slate-100 uppercase tracking-wider">{agent_id}</h3>
                                <p className="text-xs text-brand-500 font-medium">{model_name}</p>
                            </div>
                            <div className="bg-slate-800 px-3 py-1 rounded-full text-xs font-mono text-slate-300 shadow-inner">
                                {latency_ms.toFixed(0)}ms
                            </div>
                        </div>

                        <div className="flex-1 w-full bg-slate-800/50 rounded-lg p-4 mb-6 relative group overflow-y-auto max-h-48 border border-slate-700/50 shadow-inner text-sm text-slate-200 leading-relaxed italic">
                            "{action.reply_text || "Decided not to reply."}"
                        </div>

                        <div className="w-full mt-auto space-y-3">
                            <div className="flex justify-between text-xs text-slate-400 font-medium">
                                <span>Current Votes: {votes[agent_id]}</span>
                                <span>{percent}%</span>
                            </div>
                            <div className="w-full bg-slate-800 rounded-full h-2 mb-4 overflow-hidden shadow-inner">
                                <div 
                                    className="bg-brand-500 h-2 rounded-full transition-all duration-500 ease-out" 
                                    style={{ width: `${percent}%` }}
                                ></div>
                            </div>
                            
                            <button 
                                onClick={() => handleVote(agent_id)}
                                className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold rounded-xl transition-all shadow-lg hover:shadow-indigo-500/30 transform active:scale-95"
                            >
                                Send This Reply 🚀
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-8 max-w-7xl mx-auto">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-10 glass-panel p-6 rounded-3xl">
                        <div>
                            <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">
                                OpenEnv Email Assistant
                            </h1>
                            <p className="text-slate-400 mt-1">Benchmarking Gemini vs Groq Models</p>
                        </div>
                        
                        {/* Battle Mode Toggle */}
                        <div className="flex items-center space-x-4 bg-slate-800/80 px-6 py-3 rounded-full border border-slate-700 shadow-inner">
                            <span className={`font-semibold ${!battleMode ? 'text-slate-200' : 'text-slate-500'}`}>Standard</span>
                            
                            <label className="relative inline-flex items-center cursor-pointer">
                                <input 
                                    type="checkbox" 
                                    className="sr-only peer" 
                                    checked={battleMode}
                                    onChange={() => setBattleMode(!battleMode)} 
                                />
                                <div className="w-14 h-7 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-gradient-to-r peer-checked:from-pink-500 peer-checked:to-orange-500 shadow-inner"></div>
                            </label>
                            
                            <span className={`font-semibold flex items-center space-x-2 ${battleMode ? 'text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-orange-400' : 'text-slate-500'}`}>
                                ⚔️ Battle Mode
                            </span>
                        </div>
                    </div>

                    {!battleMode ? (
                        <div className="flex flex-col items-center justify-center h-64 glass-panel rounded-3xl border-dashed border-2 border-slate-700 text-slate-400">
                            <span className="text-4xl mb-4">🛡️</span>
                            <h2 className="text-xl font-medium">Standard Dashboard active</h2>
                            <p className="mt-2 text-sm">Toggle Battle Mode in the top right to compare the agents side-by-side.</p>
                        </div>
                    ) : (
                        <div className="space-y-8 animate-fade-in-up">
                            {/* Context Card */}
                            <div className="glass-panel p-6 rounded-2xl border-l-4 border-l-brand-500">
                                <div className="flex justify-between items-start">
                                    <div className="space-y-1">
                                        <div className="flex items-center space-x-2">
                                            <span className="bg-slate-800 text-slate-300 text-xs px-2 py-1 rounded-md font-medium uppercase tracking-wider">Hard Task</span>
                                            <span className="text-slate-400 text-sm">Reply Generation</span>
                                        </div>
                                        <h2 className="text-xl font-semibold text-white mt-2">Subject: {mockEmail.subject}</h2>
                                        <p className="text-sm text-slate-400">From: <span className="text-slate-300">{mockEmail.sender}</span></p>
                                    </div>
                                </div>
                                <div className="mt-4 bg-slate-800/50 p-4 rounded-xl text-slate-300 text-sm shadow-inner border border-slate-700/50">
                                    {mockEmail.body}
                                </div>
                            </div>

                            {/* Battle Arena */}
                            {loading ? (
                                <div className="flex justify-center items-center h-64 font-mono text-brand-400 animate-pulse">
                                    <span className="text-2xl mr-3">⚡</span> Agents are formulating replies...
                                </div>
                            ) : (
                                <div className="flex flex-col md:flex-row gap-6 items-stretch">
                                    {results.map((r, i) => (
                                        <AgentCard key={i} result={r} />
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
